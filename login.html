<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#e8f4f8;
}

.login-box{
width:400px;
margin:80px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#0077b6;
}

.login-box input{
width:100%;
padding:12px;
margin:12px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

.login-box button{
width:100%;
padding:12px;
background:#0077b6;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login-box button:hover{
background:#005f8d;
}

#error{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>

</head>
