<section class="dashboard">
    <h1 style="text-align:center;">Community Health Monitoring</h1>

    <form id="healthForm" style="max-width:700px;margin:30px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);">

        <label><b>Village Name</b></label><br>
        <input type="text" id="village" placeholder="Enter Village Name" required style="width:100%;padding:10px;margin:10px 0;"><br>

        <label><b>Patient Name</b></label><br>
        <input type="text" id="patient" placeholder="Enter Patient Name" required style="width:100%;padding:10px;margin:10px 0;"><br>

        <label><b>Age</b></label><br>
        <input type="number" id="age" placeholder="Enter Age" required style="width:100%;padding:10px;margin:10px 0;"><br>

        <label><b>Disease</b></label><br>
        <select id="disease" style="width:100%;padding:10px;margin:10px 0;">
            <option>Cholera</option>
            <option>Typhoid</option>
            <option>Dysentery</option>
            <option>Hepatitis A</option>
        </select><br>

        <label><b>Water Quality (%)</b></label><br>
        <input type="range" id="water" min="0" max="100" value="80" oninput="valueOutput.innerHTML=this.value">
        <span id="valueOutput">80</span>%<br><br>

        <button type="submit" style="padding:12px 30px;background:#0077b6;color:white;border:none;border-radius:5px;cursor:pointer;">
            Submit Report
        </
