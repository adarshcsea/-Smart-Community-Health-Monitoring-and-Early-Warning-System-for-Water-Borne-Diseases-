<title>Early Warning Alerts</title>

<link rel="stylesheet" href="style.css">

<style>

.alert-container{
width:90%;
margin:40px auto;
}

.alert-card{
background:white;
padding:20px;
margin:20px 0;
border-left:8px solid red;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.high{
border-left-color:red;
}

.medium{
border-left-color:orange;
}

.low{
border-left-color:green;
}

.status{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

button{
padding:12px 25px;
background:#0077b6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#005f8d;
}

</style>

</head>
